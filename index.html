<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ClipShortener</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background: radial-gradient(circle at top, #3a0a4a, #0b0012);
  color:white;
  text-align:center;
}

.container{
  padding:20px;
}

h1{
  color:#ff4dff;
}

.box{
  margin-top:20px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
}

button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff00cc,#7a5cff);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  opacity:0.5;
}

#loading{
  margin-top:15px;
  display:none;
}

.clip{
  margin-top:15px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<div class="container">

<h1>ClipShortener</h1>
<p>Turn long videos into short clips instantly</p>

<div class="box">

<input type="file" id="videoInput"><br><br>

<button id="splitBtn">Split Video</button>

<div id="loading">Processing video...</div>

<div id="clipsContainer"></div>

</div>

</div>

<script>

const API = "https://mrayz-clipshortener-api.hf.space";

document.getElementById("splitBtn").addEventListener("click", splitVideo);

async function splitVideo(){

const fileInput = document.getElementById("videoInput");
const file = fileInput.files[0];
const btn = document.getElementById("splitBtn");
const loading = document.getElementById("loading");
const clipsContainer = document.getElementById("clipsContainer");

if(!file){
alert("Upload a video");
return;
}

btn.disabled = true;
loading.style.display = "block";
clipsContainer.innerHTML = "";

try{

const formData = new FormData();
formData.append("file", file);

const res = await fetch(`${API}/split?segment_seconds=15`, {
method: "POST",
body: formData
});

if(!res.ok){
throw new Error("Server failed");
}

const data = await res.json();

if(!data.clips || data.clips.length === 0){
throw new Error("No clips returned");
}

data.clips.forEach((name, index)=>{

const div = document.createElement("div");
div.className = "clip";

div.innerHTML = `
<p>Clip ${index+1}</p>
<a href="${API}/download/${name}" target="_blank">
<button>Download</button>
</a>
`;

clipsContainer.appendChild(div);

});

}catch(err){

alert("Error: " + err.message);

}finally{

btn.disabled = false;
loading.style.display = "none";

}

}

</script>

</body>
</html>
